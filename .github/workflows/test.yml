name: tests
on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    uses: salesforcecli/github-workflows/.github/workflows/unitTest.yml@main
  nuts:
    needs: unit-tests
    uses: salesforcecli/github-workflows/.github/workflows/nut.yml@main
    secrets: inherit
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    with:
      os: ${{ matrix.os }}
      # The flow invokes core plugin commands (packaging, deploy, data) in-process,
      # so the global sf must have this plugin loaded. Link it before the NUTs run.
      command: 'sf plugins link . --no-install && yarn test:nuts'
