# CCI lineage: dependencies
description: Deploy dependencies to prepare the org environment for the package metadata.
params:
  - name: target-org
    type: string
    required: true
    description: Org alias or username to install dependencies into.
steps:
  update-dependencies:
    task: package/install/dependencies
    params:
      target-org: ${{ params.target-org }}
  deploy-pre:
    # CCI: deploy_pre — deploys each bundle under unpackaged/pre. No-ops if absent.
    task: metadata/deploy/bundles
    params:
      target-org: ${{ params.target-org }}
      path: unpackaged/pre
