# CCI lineage: release_2gp_beta
description: Upload and release a beta 2GP managed package version.
steps:
  create-version:
    task: package/version/create
    params:
      code-coverage: true
  github-release:
    task: github/release/create
    params:
      version-id: ${{ steps.create-version.version-id }}
      prerelease: true
  release-notes:
    task: github/release/notes
    params:
      version-id: ${{ steps.create-version.version-id }}
# CCI's release_2gp_beta ends with github_automerge_main — intentionally omitted.
# We do not inherit CCI's auto-merge feature; see 2GP_FLOW_PLAN.md design note 5.
