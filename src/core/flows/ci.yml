description: Run CI checks against a scratch org
steps:
  create-org:
    task: org/create/scratch
    params:
      scratch-def: dev
      duration: 1
  deploy:
    task: metadata/deploy
    params:
      target-org: ${{steps.create-org.target-org}}
  test:
    task: apex/run/test
    params:
      target-org: ${{steps.create-org.target-org}}
