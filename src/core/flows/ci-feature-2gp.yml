# CCI lineage: ci_feature_2gp
#   1) flow: install_2gp_commit   -> inlined (see install-2gp-commit.yml)
#   2) flow: config_apextest      -> inlined (deploy_post, update_admin_profile)
#   3) run_tests                  -> apex/run/test
description: Install as a managed 2GP package and run Apex tests. Run after build-2gp.
params:
  - name: target-org
    type: string
    required: true
    description: Org alias or username to set up and test against.
steps:
  # --- install_2gp_commit ---
  package-data:
    task: package/version/list
    params:
      released: false
  update-dependencies:
    task: package/install/dependencies
    params:
      target-org: ${{ params.target-org }}
  deploy-pre:
    task: metadata/deploy/bundles
    params:
      target-org: ${{ params.target-org }}
      path: unpackaged/pre
  install:
    task: package/install
    params:
      target-org: ${{ params.target-org }}
      version-id: ${{ steps.package-data.version-id }}
  # --- config_apextest ---
  deploy-post:
    task: metadata/deploy/bundles
    params:
      target-org: ${{ params.target-org }}
      path: unpackaged/post
      inject-namespace: true
  update-admin-profile:
    task: org/admin-profile/update
    params:
      target-org: ${{ params.target-org }}
  # --- run_tests ---
  test:
    task: apex/run/test
    params:
      target-org: ${{ params.target-org }}
      test-level: RunLocalTests
