description: Install the latest production release into a fresh scratch org and run Apex tests.
params:
  - name: test-level
    type: string
    required: false
    default: RunAllTestsInOrg
    description: 'Apex test level to run post-install. One of: RunAllTestsInOrg, RunSpecifiedTests.'
  - name: test-classes
    type: string
    required: false
    description: Comma-separated test class names. Required when test-level is RunSpecifiedTests.
steps:
  create-org:
    task: org/create/scratch
    params:
      scratch-def: release
      duration: 1
      no-namespace: true
  find-release:
    task: package/version/resolve-latest
    params:
      released: true
  update-dependencies:
    task: package/install/dependencies
    params:
      target-org: ${{ steps.create-org.target-org }}
  install:
    task: package/install
    params:
      target-org: ${{ steps.create-org.target-org }}
      version-id: ${{ steps.find-release.version-id }}
  assign-permsets:
    task: org/assign/permsets
    params:
      target-org: ${{ steps.create-org.target-org }}
  test:
    task: apex/run/test
    params:
      target-org: ${{ steps.create-org.target-org }}
      test-level: ${{ params.test-level }}
      class-names: ${{ params.test-classes }}
