description: Set up an org as a QA environment using a 2GP managed package.
params:
  - name: target-org
    type: string
    required: true
    description: Org alias or username to set up.
steps:
  # --- install_2gp_commit ---
  package-data:
    task: package/version/list
    params:
      released: false
  update-dependencies:
    task: package/install/dependencies
    params:
      target-org: ${{ params.target-org }}
  check-pre:
    task: util/file/exists
    params:
      path: unpackaged/pre
  deploy-pre:
    if:
      value: ${{ steps.check-pre.exists }}
    task: project/deploy/start
    params:
      target-org: ${{ params.target-org }}
      source-dir: unpackaged/pre
  install:
    task: package/install
    params:
      target-org: ${{ params.target-org }}
      version-id: ${{ steps.package-data.version-id }}
  # --- config_qa ---
  check-post:
    task: util/file/exists
    params:
      path: unpackaged/post
  deploy-post:
    if:
      value: ${{ steps.check-post.exists }}
    task: project/deploy/start
    params:
      target-org: ${{ params.target-org }}
      source-dir: unpackaged/post
  update-admin-profile:
    task: org/admin-profile/update
    params:
      target-org: ${{ params.target-org }}
  load-data:
    task: data/import/tree
    params:
      target-org: ${{ params.target-org }}
